<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — FinanceOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 2rem 0;
        }
        .auth-card {
            background-color: #09090b; border: 1px solid #27272a; border-radius: 16px;
            padding: 3rem 2.5rem; width: 100%; max-width: 450px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .text-accent { color: #4ade80; }
        .form-label { font-size: 0.85rem; color: #a1a1aa; margin-bottom: 0.3rem; }
        .form-control {
            background-color: #121212; border: 1px solid #27272a; color: white;
            padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.95rem;
        }
        .form-control:focus { background-color: #18181b; border-color: #4ade80; color: white; box-shadow: 0 0 0 0.2rem rgba(74, 222, 128, 0.1); }
        .btn-custom-light {
            background-color: #ffffff; color: #000000; font-weight: 600; padding: 0.75rem;
            border-radius: 8px; width: 100%; border: none; margin-top: 0.5rem; transition: opacity 0.2s;
        }
        .btn-custom-light:hover { opacity: 0.9; }
        .back-link { position: absolute; top: 20px; left: 20px; color: #a1a1aa; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #ffffff; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<a href="{% url 'index' %}" class="back-link">← Back to Home</a>

<div class="auth-card text-center">
    <h3 class="fw-bold mb-4">Join Finance<span class="text-accent">OS</span></h3>
    
    <form method="POST" action="">
        {% csrf_token %}
        <div class="text-start">
            <label class="form-label">Choose a Username</label>
            <input type="text" name="username" class="form-control" required placeholder="e.g. Satoshi">
            
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required placeholder="Create a strong password">
            
            <label class="form-label">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" required placeholder="Type it again">
        </div>
        
        <button type="submit" class="btn-custom-light">Create Account</button>
    </form>
    
    <p class="mt-4 text-muted small mb-0">Already have an account? <a href="{% url 'login' %}" class="text-accent text-decoration-none">Login</a></p>
</div>
{% if messages %}
    <script>
        {% for message in messages %}
            Swal.fire({
                title: "{% if message.tags == 'error' %}Oops!{% else %}Success!{% endif %}",
                text: "{{ message }}",
                icon: "{{ message.tags }}",
                background: '#09090b', // Matches your dark theme
                color: '#ffffff',
                confirmButtonColor: '#4ade80', // Matches your neon green
                confirmButtonText: 'Try Again'
            });
        {% endfor %}
    </script>
{% endif %}
</body>
</html>
