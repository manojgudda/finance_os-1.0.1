<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Planner — FinanceOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .navbar { border-bottom: 1px solid #27272a; padding: 1rem 0; background-color: rgba(9, 9, 11, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;}
        .brand-logo { font-size: 1.25rem; font-weight: 800; color: #ffffff; text-decoration: none; }
        .text-accent { color: #4ade80; }
        
        .card-custom { background-color: #09090b; border: 1px solid #27272a; border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; max-width: 600px; margin: 0 auto;}
        
        .form-label { font-size: 0.9rem; color: #a1a1aa; font-weight: 500; }
        .form-control { background-color: #121212; border: 1px solid #27272a; color: white !important; padding: 0.75rem; border-radius: 8px; }
        .form-control:focus { background-color: #18181b; border-color: #4ade80; color: white; box-shadow: none; }
        .btn-accent { background-color: #4ade80; color: #000; font-weight: 600; padding: 0.75rem 1.25rem; border-radius: 8px; border: none; width: 100%; transition: 0.2s; }
        .btn-accent:hover { background-color: #22c55e; }
    </style>
</head>
<body>

<nav class="navbar mb-5">
    <div class="container d-flex justify-content-between align-items-center" style="max-width: 1100px;">
        <div class="d-flex align-items-center">
            <a href="{% url 'dashboard' %}" class="brand-logo me-4">Finance<span class="text-accent">OS</span></a>
            <div class="d-flex gap-2">
                <a href="{% url 'dashboard' %}" class="btn btn-sm" style="background-color: transparent; color: #a1a1aa; border: 1px solid transparent; transition: 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#a1a1aa'">Dashboard</a>
                <a href="{% url 'budgets' %}" class="btn btn-sm" style="background-color: #18181b; color: #ffffff; border: 1px solid #3f3f46; font-weight: 500;">Budgets</a>
                <a href="{% url 'tools' %}" class="btn btn-sm" style="background-color: transparent; color: #a1a1aa; border: 1px solid transparent; transition: 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#a1a1aa'">Smart Tools</a>
                <a href="{% url 'tracker' %}" class="btn btn-sm" style="background-color: transparent; color: #a1a1aa; border: 1px solid transparent; transition: 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#a1a1aa'">Price Tracker</a>
                <a href="{% url 'taxes' %}" class="btn btn-sm" style="background-color: transparent; color: #a1a1aa; border: 1px solid transparent; transition: 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#a1a1aa'">Tax Hub</a>
                <a href="{% url 'investments' %}" class="btn btn-sm" style="background-color: transparent; color: #a1a1aa; border: 1px solid transparent; transition: 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#a1a1aa'">Investments</a>
                <a href="{% url 'splits' %}" class="btn btn-sm" style="background-color: transparent; color: #a1a1aa; border: 1px solid transparent; transition: 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#a1a1aa'">Split Bills</a>



            </div>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="card-custom">
        <h4 class="fw-bold text-center mb-1">🎯 Budget Planner</h4>
        <p class="text-muted text-center small mb-4">Set your monthly spending limits. Set a category to 0 to ignore it.</p>
        
        <form method="POST">
            {% csrf_token %}
            
            {% for cat, limit in budgets.items %}
            <div class="mb-3 row align-items-center">
                <label class="col-sm-4 col-form-label">{{ cat }}</label>
                <div class="col-sm-8">
                    <div class="input-group">
                        <span class="input-group-text" style="background: #18181b; border: 1px solid #27272a; color: #a1a1aa;">₹</span>
                        <input type="number" name="limit_{{ cat }}" class="form-control" value="{{ limit|floatformat:0 }}" min="0">
                    </div>
                </div>
            </div>
            {% endfor %}

            <button type="submit" class="btn-accent mt-4">Save Budget Limits</button>
        </form>
    </div>
</div>

{% if messages %}
    <script>
        {% for message in messages %}
            Swal.fire({ title: "Updated!", text: "{{ message }}", icon: "success", background: '#09090b', color: '#ffffff', confirmButtonColor: '#4ade80', timer: 2000, showConfirmButton: false });
        {% endfor %}
    </script>
{% endif %}

</body>
</html>
